<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #d32f2f;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 2rem 1rem; }
        .admin-card { max-width: 900px; margin: 0 auto; background: var(--card); padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        h2 { color: #1e293b; margin-bottom: 2rem; font-weight: 800; border-bottom: 3px solid var(--primary); padding-bottom: 0.5rem; display: inline-block; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 700; color: #475569; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 0.8rem; font-size: 1rem; transition: border-color 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .btn { padding: 1rem 2rem; border-radius: 1rem; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 1rem; }
        .btn-accent { background: var(--accent); color: white; margin-top: 1.5rem; }
        .item-box { background: #f1f5f9; padding: 1.5rem; border-radius: 1rem; margin-bottom: 1rem; position: relative; border-left: 5px solid var(--primary); }
        .remove-btn { position: absolute; top: 10px; right: 10px; color: var(--accent); cursor: pointer; font-size: 1.5rem; }
        #json-output { background: #1e293b; color: #38bdf8; padding: 1.5rem; border-radius: 1rem; margin-top: 2rem; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 0.85rem; display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>A1 Quiz Generator</h2>
    
    <div class="row">
        <div class="input-group">
            <label>Subject</label>
            <select id="subject" onchange="updateCode()">
                <option value="social">Social Science</option>
                <option value="science">Science</option>
                <option value="tamil">Tamil</option>
                <option value="english">English</option>
                <option value="maths">Mathematics</option>
                <option value="psychology">Psychology</option>
            </select>
        </div>
        <div class="input-group">
            <label>Grade (Class)</label>
            <select id="grade" onchange="updateCode()">
                <option value="5">Grade 5</option>
                <option value="4">Grade 4</option>
                <option value="6">Grade 6</option>
                <option value="3">Grade 3</option>
                <option value="tet">TET General</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="input-group">
            <label>Term</label>
            <select id="term" onchange="updateCode()">
                <option value="t1">Term 1</option>
                <option value="t2">Term 2</option>
                <option value="t3">Term 3</option>
                <option value="full">Full Year</option>
            </select>
        </div>
        <div class="input-group">
            <label>Unit/Lesson Number (e.g. 1, 2...)</label>
            <input type="number" id="unit" value="1" oninput="updateCode()">
        </div>
    </div>

    <div class="input-group">
        <label>Generated File Code (Database Filename)</label>
        <input type="text" id="file_code" placeholder="soc_5_t1_l1" readonly style="background: #f1f5f9; cursor: not-allowed; font-weight: 800; color: var(--primary);">
    </div>

    <div class="input-group">
        <label>Lesson Title (Tamil/English)</label>
        <input type="text" id="lesson_title" placeholder="e.g. நமது பூமி">
    </div>

    <hr style="margin: 2rem 0; opacity: 0.1;">

    <div class="input-group">
        <label for="bulk-quiz-input">Bulk Quiz Input (Pasted Questions Here)</label>
        <textarea id="bulk-quiz-input" placeholder="Example format:
1. Question text here?
A) Option 1
B) Option 2
C) Option 3
D) Option 4
Ans: A
Exp: Explanation starts here...
... can be many lines long ...

Next Question..." style="height: 400px; font-family: 'Courier New', monospace;"></textarea>
        <div id="parse-status" style="font-size: 0.8rem; color: var(--accent); font-weight: 700; margin-top: 0.5rem; text-align: right;">Paste your content and click Import</div>
        <button class="btn btn-primary" onclick="importBulkQuiz()">IMPORT BULK QUESTIONS</button>
    </div>

    <div id="quiz-list"></div>
    
    <button class="btn btn-accent" onclick="addQuestion()">+ Add Single Question Manually</button>
    <button class="btn btn-primary" style="background:#10b981;" onclick="generateJSON()">GENERATE & SAVE JSON</button>

    <pre id="json-output"></pre>
</div>

<script>
    function updateCode() {
        const sub = document.getElementById('subject').value.substring(0, 3);
        const grade = document.getElementById('grade').value;
        const term = document.getElementById('term').value;
        const unit = document.getElementById('unit').value;
        document.getElementById('file_code').value = `${sub}_${grade}_${term}_l${unit}`;
    }
    updateCode();

    function addQuestion() {
        createQuestionUI("", ["", "", "", ""], 0, "");
    }

    function createQuestionUI(qText, options, answer, explanation) {
        const container = document.getElementById('quiz-list');
        const div = document.createElement('div');
        div.className = 'item-box';
        div.innerHTML = `
            <ion-icon name="trash" class="remove-btn" onclick="this.parentElement.remove()"></ion-icon>
            <div class="field" style="margin-bottom:10px;"><label>கேள்வி</label><input type="text" class="q-text" value="${qText.replace(/"/g, '&quot;')}"></div>
            <div class="row" style="margin-bottom:10px;">
                <div class="field"><label>A</label><input type="text" class="q-o0" value="${(options[0] || '').replace(/"/g, '&quot;')}"></div>
                <div class="field"><label>B</label><input type="text" class="q-o1" value="${(options[1] || '').replace(/"/g, '&quot;')}"></div>
            </div>
            <div class="row" style="margin-bottom:10px;">
                <div class="field"><label>C</label><input type="text" class="q-o2" value="${(options[2] || '').replace(/"/g, '&quot;')}"></div>
                <div class="field"><label>D</label><input type="text" class="q-o3" value="${(options[3] || '').replace(/"/g, '&quot;')}"></div>
            </div>
            <div class="row">
                <div class="field"><label>விடை</label><select class="q-ans">
                    <option value="0" ${answer === 0 ? 'selected' : ''}>A</option>
                    <option value="1" ${answer === 1 ? 'selected' : ''}>B</option>
                    <option value="2" ${answer === 2 ? 'selected' : ''}>C</option>
                    <option value="3" ${answer === 3 ? 'selected' : ''}>D</option>
                </select></div>
                <div class="field"><label>விளக்கம்</label><textarea class="q-exp" rows="3">${explanation.replace(/<br>/g, '\n')}</textarea></div>
            </div>
        `;
        container.appendChild(div);
    }

    // --- BULK PARSER ---
    function importBulkQuiz() {
        let raw = document.getElementById('bulk-quiz-input').value;
        raw = raw.replace(/\*\*/g, ''); // Remove bold asterisks
        
        function cleanTerm(txt) {
            if (!txt) return "";
            let s = txt.replace(/^\**\s*(?:Q\s*)?\d+\s*[\.\)]\s*/i, '').replace(/^\*+/, '').replace(/\*+$/, '').trim();
            // Parentheses balancing
            let open = (s.match(/\(/g) || []).length;
            let close = (s.match(/\)/g) || []).length;
            if (open > close) s = s.replace(/\(([^)\s]+)(?!\))/g, '($1)');
            else if (close > open) s = s.replace(/\s*\)$/, '');
            return s;
        }

        const questions = raw.split(/\n\s*\n/).filter(q => q.trim() !== "");
        let count = 0;
        
        questions.forEach(qBlock => {
            const lines = qBlock.split('\n').map(l => l.trim()).filter(l => l !== "");
            if (lines.length < 5) return;

            const qText = cleanTerm(lines[0]);
            const options = [];
            let answer = 0;
            let explanation = "";
            let expFoundIdx = -1;

            lines.forEach((line, index) => {
                const optMatch = line.match(/^([A-D])[\.\)]\s*(.*)/i);
                if (optMatch) {
                    options[optMatch[1].toUpperCase().charCodeAt(0) - 65] = cleanTerm(optMatch[2]);
                }
                const ansMatch = line.match(/(?:Ans|விடை)\s*[:\-]?\s*([A-D])/i);
                if (ansMatch) {
                    answer = ansMatch[1].toUpperCase().charCodeAt(0) - 65;
                }
                if (expFoundIdx === -1) {
                    const expMatch = line.match(/(?:Exp|விளக்கம்)\s*[:\-]?\s*(.*)/i);
                    if (expMatch) {
                        explanation = cleanTerm(expMatch[1]);
                        expFoundIdx = index;
                    }
                } else if (index > expFoundIdx) {
                    explanation += (explanation !== "" ? "<br>" : "") + cleanTerm(line);
                }
            });

            createQuestionUI(qText, options, answer, explanation);
            count++;
        });

        const statusLabel = document.getElementById('parse-status');
        if (statusLabel) {
            statusLabel.innerText = `Successfully parsed ${count} questions. Check below and click Save.`;
            statusLabel.style.color = "#10b981";
        }
        document.getElementById('bulk-quiz-input').value = "";
    }

    function generateJSON() {
        const data = {
            lesson_meta: {
                title: document.getElementById('lesson_title').value,
                unit: "l" + document.getElementById('unit').value,
                grade: document.getElementById('grade').value,
                term: document.getElementById('term').value,
                subject: document.getElementById('subject').value,
                code: document.getElementById('file_code').value
            },
            quiz: { questions: [] }
        };

        const items = document.querySelectorAll('.item-box');
        items.forEach(item => {
            const q = {
                question: item.querySelector('.q-text').value,
                options: [
                    item.querySelector('.q-o0').value,
                    item.querySelector('.q-o1').value,
                    item.querySelector('.q-o2').value,
                    item.querySelector('.q-o3').value
                ],
                answer: parseInt(item.querySelector('.q-ans').value),
                explanation: item.querySelector('.q-exp').value.replace(/\n/g, '<br>')
            };
            data.quiz.questions.push(q);
        });

        const output = document.getElementById('json-output');
        output.textContent = JSON.stringify(data, null, 2);
        output.style.display = 'block';

        // Downloader
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = data.lesson_meta.code + ".json";
        a.click();
    }
</script>

</body>
</html>
