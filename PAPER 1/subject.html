<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus - Tamil Nanban</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Tamil:wght@400;700&family=Baloo+Thambi+2:wght@800&display=swap">
    <style>
        /* RE-REFINING UI TO MATCH OLD STYLE */
        .class-tabs-container {
            margin-bottom: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .class-tabs-header {
            font-weight: 800;
            color: #1e3a8a;
            margin-bottom: 1rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .class-tabs {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap; /* Ensure all classes are visible at once */
            padding: 4px;
        }

        .class-tab {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s ease;
            color: #64748b;
            min-width: 60px;
            text-align: center;
            font-size: 0.9rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .class-tab.active {
            background: #1e3a8a;
            color: white;
            border-color: #1e3a8a;
            box-shadow: 0 8px 15px rgba(30, 58, 138, 0.2);
            transform: translateY(-2px);
        }

        .term-section { margin-bottom: 3rem; }
        .term-title {
            font-family: 'Baloo Thambi 2', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .topic-card {
            background: #ffffff;
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
            cursor: pointer;
            overflow: hidden;
        }

        .topic-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.1);
            border-color: #cbd5e1;
        }

        .topic-title-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .topic-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #334155;
            flex: 1;
        }

        .chevron {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s ease;
            color: #94a3b8;
        }

        .topic-card.expanded .chevron {
            transform: rotate(180deg);
            color: #1e3a8a;
        }

        .btn-group {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 1.25rem;
            animation: slideDown 0.4s ease;
        }

        .topic-card.expanded .btn-group {
            display: grid;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-btn {
            padding: 1rem 0.5rem;
            border-radius: 14px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 800;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            color: white;
            border: none;
        }

        .btn-notes { 
            background: linear-gradient(135deg, #0d9488, #0f766e); 
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); 
        }
        .btn-quiz { 
            background: linear-gradient(135deg, #1e40af, #1e3a8a); 
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.2); 
        }
        
        .card-btn:hover { 
            transform: translateY(-3px); 
            filter: brightness(1.1);
        }

        .topic-card.faded { opacity: 0.6; filter: grayscale(0.5); }
        
        @media (max-width: 640px) {
            .topics-grid { grid-template-columns: 1fr; }
            .btn-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header-standard">
        <a href="index.html" class="brand-container">
            <div class="brand-main">தமிழ் நண்பன்</div>
            <div class="brand-sub">COACHING CENTER</div>
        </a>
    </header>

    <main class="container" style="padding-top: 1.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 id="subjectTitle" style="color: #1e3a8a; font-size: 1.8rem; margin: 0; font-family: 'Baloo Thambi 2';">பாடம்</h1>
        </div>

        <div class="class-tabs-container">
            <div class="class-tabs-header" id="classTabsTitle" style="display: none;">வகுப்புகளைத் தேர்ந்தெடுக்கவும்</div>
            <div class="class-tabs" id="classToggle">
                <!-- Tabs injected here -->
            </div>
        </div>

        <div id="syllabusContainer">
            <div style="text-align:center; padding:5rem; color:#888;">
                பாடங்கள் லோடு ஆகின்றன...
            </div>
        </div>

        <div style="height: 100px;"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="course.html" class="nav-item active">
            <span class="nav-icon">📚</span>
            <span>Course</span>
        </a>
        <a href="tel:6369371452" class="nav-item">
            <span class="nav-icon">📞</span>
            <span>Contact</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Pay</span>
        </a>
        <a href="#" onclick="window.logout(); return false;" class="nav-item logout">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </nav>

    <script type="module">
        (async () => {
            const v = "standard_v7";
            try {
                // Fetch required data
                const { checkAuth, waitForAuth } = await import(`./js/auth.js?v=${v}`);
                await waitForAuth();
                const { syllabusData } = await import(`./js/data/syllabus.js?v=${v}`);
                const { extraSyllabusData } = await import(`./js/data/extraSyllabus.js?v=${v}`);

                const params = new URLSearchParams(window.location.search);
                const subject = params.get('id') || 'tamil';
                const paper = params.get('paper');
                const urlClass = params.get('class');

                const titles = {
                    'tamil': 'தமிழ் (Tamil)', 'english': 'English', 'maths': 'கணிதம் (Maths)',
                    'science': paper === '1' ? 'சூழ்நிலையியல் (EVS)' : 'அறிவியல் (Science)',
                    'social': paper === '1' ? 'சமூகவியல் (Social)' : 'சமூக அறிவியல் (Social)',
                    'psychology': 'உளவியல் (Psychology)',
                    'revision': 'திருப்புதல் தேர்வு (Revision)',
                    'mocktest': 'மாதிரித்தேர்வு (Mock Exam)',
                    'standard_6_7_8': '6, 7, 8 வகுப்புகள் (Exams)'
                };

                const titleEl = document.getElementById('subjectTitle');
                const syllabusContainer = document.getElementById('syllabusContainer');
                const classToggleEl = document.getElementById('classToggle');
                const classToggleWrap = document.querySelector('.class-tabs-container');

                let currentClass = null;
                let allowedClasses = ['6', '7', '8'];
                let useData = syllabusData;

                if (subject === 'psychology' || subject === 'revision' || subject === 'mocktest' || subject === 'standard_6_7_8') {
                    allowedClasses = ['all'];
                    currentClass = 'all';
                    useData = extraSyllabusData;
                }
                else if (paper === '1') {
                    allowedClasses = ['1', '2', '3', '4', '5'];
                } else if (paper === 'extra') allowedClasses = ['9', '10'];

                // RENDER FUNCTIONS
                const renderLessons = () => {
                    if (!syllabusContainer) return;
                    const data = useData[subject]?.[currentClass];
                    
                    if (!data || data.length === 0) {
                        syllabusContainer.innerHTML = `
                        <div style="text-align:center;padding:4rem;color:#64748b;">
                            <div style="font-size:3rem;margin-bottom:1rem;">📂</div>
                            <b style="color:#1e3a8a;">வகுப்பு ${currentClass} பாடங்கள் இன்னும் பதிவேற்றப்படவில்லை.</b><br>
                            விரைவில் தேர்வுகளுக்காக பதிவேற்றப்படும்.
                        </div>`;
                        return;
                    }

                    let html = '';
                    let testCounter = 1;
                    data.forEach(term => {
                        const tTitle = (currentClass === 'all') ? term.term : (term.term === 'Annual' ? 'முழு ஆண்டு' : `பருவம் ${term.term}`);
                        html += `<div class="term-section"><h2 class="term-title">${tTitle}</h2>`;
                        
                        term.units.forEach(unit => {
                            if (currentClass === 'all' && unit.title) {
                                html += `<h3 style="margin: 2rem 0 1rem; color: #1e40af; font-size: 1.4rem; padding-bottom: 0.5rem; border-bottom: 2px solid #e2e8f0;">${unit.title}</h3>`;
                            }
                            html += `<div class="topics-grid">`;
                            unit.topics.forEach(topic => {
                                const isReady = topic.isUpdated;

                                let displayTitle = topic.title;
                                if (paper === 'extra') {
                                    const testName = (testCounter % 2 === 0) ? 'திருப்புதல் தேர்வு' : 'மாதிரித்தேர்வு';
                                    displayTitle = `${testName} ${Math.ceil(testCounter/2)}`;
                                }

                            html += `
                                <div class="topic-card ${isReady ? '' : 'faded'}" ${isReady ? 'onclick="toggleAccordion(this)"' : ''}>
                                    <div class="topic-title-wrapper">
                                        <h3 class="topic-title">
                                            ${displayTitle}
                                            ${isReady ? '' : '<span style="font-size:0.7rem; color:#64748b; margin-left:8px; font-weight:400;">(விரைவில்...)</span>'}
                                        </h3>
                                        <div class="chevron">
                                            ${isReady ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' : '🔒'}
                                        </div>
                                    </div>
                                    ${isReady ? `
                                    <div class="btn-group">
                                        <a href="material.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}${paper ? `&paper=${paper}` : ''}" class="card-btn btn-notes" onclick="event.stopPropagation()">
                                            <span>📚</span>&nbsp;பாடக்குறிப்புகள்
                                        </a>
                                        <a href="quiz.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}${paper ? `&paper=${paper}` : ''}" class="card-btn btn-quiz" onclick="event.stopPropagation()">
                                            <span>📝</span>&nbsp;தேர்வு
                                        </a>
                                    </div>` : ''}
                                </div>`;
                                if (isReady) testCounter++;
                            });
                            html += `</div>`; // Close topics-grid
                        });
                        html += `</div>`; // Close term-section
                    });
                    syllabusContainer.innerHTML = html;
                };

                const setupTabs = () => {
                    if (!classToggleEl || subject === 'psychology' || subject === 'revision' || subject === 'mocktest' || subject === 'standard_6_7_8') {
                        if (classToggleWrap) classToggleWrap.style.display = 'none';
                        return;
                    }
                    classToggleWrap.style.display = 'block';
                    const titleElObj = document.getElementById('classTabsTitle');
                    if(titleElObj) titleElObj.style.display = 'block';
                    classToggleEl.innerHTML = allowedClasses.map(c => `
                        <button class="class-tab ${String(c) === String(currentClass) ? 'active' : ''}" data-class="${c}">${c === 'all' ? 'All' : c}</button>
                    `).join('');
                    
                    classToggleEl.querySelectorAll('button').forEach(btn => {
                        btn.onclick = () => selectClass(btn.dataset.class);
                    });
                };

                const selectClass = (c, isPop = false) => {
                    currentClass = c;
                    titleEl.innerText = titles[subject] || subject;
                    setupTabs();
                    renderLessons();
                    
                    if (!isPop) {
                        const url = new URL(window.location);
                        url.searchParams.set('class', c);
                        window.history.pushState({ class: c }, '', url);
                    }
                };

                window.addEventListener('popstate', (e) => {
                    if (e.state && e.state.class) {
                        selectClass(e.state.class, true);
                    }
                });

                window.toggleAccordion = (card) => {
                    const isExpanded = card.classList.contains('expanded');
                    const isDesktop = window.innerWidth > 640;

                    if (isDesktop) {
                        const cardTop = card.offsetTop;
                        const rowCards = Array.from(document.querySelectorAll('.topic-card')).filter(c => c.offsetTop === cardTop);

                        // Close all cards from other rows
                        document.querySelectorAll('.topic-card.expanded').forEach(c => {
                            if (c.offsetTop !== cardTop) c.classList.remove('expanded');
                        });

                        // Toggle the whole row
                        const shouldExpand = !isExpanded;
                        rowCards.forEach(c => {
                            if (shouldExpand) c.classList.add('expanded');
                            else c.classList.remove('expanded');
                        });
                    } else {
                        // Standard behavior for mobile: close others, toggle selected
                        document.querySelectorAll('.topic-card.expanded').forEach(c => {
                            if (c !== card) c.classList.remove('expanded');
                        });
                        card.classList.toggle('expanded');
                    }
                };

                window.selectClass = selectClass;

                // INITIALIZATION — select first class that has data, or the requested class
                if (urlClass && allowedClasses.includes(urlClass)) {
                    selectClass(urlClass, true);
                } else {
                    const firstWithData = allowedClasses.find(c => useData[subject]?.[c] && useData[subject][c].length > 0);
                    selectClass(firstWithData || allowedClasses[0], true);
                }

            } catch (err) {
                console.error("PAGE ERROR:", err);
                const container = document.getElementById('syllabusContainer');
                if (container) container.innerHTML = `<div style="padding:4rem;text-align:center;color:red;">Error loading syllabus. Please refresh. <br><small>${err.message}</small></div>`;
            }
        })();
    </script>
</body>
</html>
