<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syllabus - Tamil Nanban</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+Tamil:wght@400;700&family=Baloo+Thambi+2:wght@800&display=swap">
    <style>
        .class-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1.25rem;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
        }

        .class-select-card {
            background: white;
            padding: 2.5rem 1rem;
            border-radius: 1.5rem;
            text-align: center;
            text-decoration: none;
            color: white !important;
            font-weight: 800;
            font-size: 1.4rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        .class-select-card:hover {
            transform: translateY(-8px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .card-color-1 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .card-color-2 { background: linear-gradient(135deg, #10b981, #059669); }
        .card-color-3 { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .card-color-4 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .card-color-5 { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .class-select-card span { font-size: 0.8rem; opacity: 0.9; margin-bottom: 0.25rem; }

        .class-tabs-container {
            margin-bottom: 2rem;
            display: none; /* Hidden by default, shown when class is selected */
        }

        .class-tabs {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            padding: 4px;
        }

        .class-tab {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            transition: all 0.3s ease;
            color: #64748b;
            min-width: 60px;
            text-align: center;
            font-size: 0.9rem;
        }

        .class-tab.active {
            background: #1e3a8a;
            color: white;
            border-color: #1e3a8a;
        }

        .term-section { margin-bottom: 3rem; }
        .term-title {
            font-family: 'Baloo Thambi 2', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: #1e3a8a;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .topic-card {
            background: #ffffff;
            border-radius: 1.25rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            border: 1px solid #f1f5f9;
            cursor: pointer;
        }

        .topic-card.expanded { border-color: #1e3a8a; }

        .btn-group {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-top: 1.25rem;
        }

        .topic-card.expanded .btn-group { display: grid; }

        .card-btn {
            padding: 1rem 0.5rem;
            border-radius: 14px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 800;
            text-align: center;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-notes { background: linear-gradient(135deg, #0d9488, #0f766e); }
        .btn-quiz { background: linear-gradient(135deg, #1e40af, #1e3a8a); }

        .topic-card.faded { opacity: 0.6; filter: grayscale(0.5); }
        
        @media (max-width: 640px) {
            .topics-grid { grid-template-columns: 1fr; }
            .btn-group { grid-template-columns: 1fr; }
            .class-select-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header class="header-standard">
        <a href="index.html" class="brand-container">
            <div class="brand-main">தமிழ் நண்பன்</div>
            <div class="brand-sub">COACHING CENTER</div>
        </a>
    </header>

    <main class="container" style="padding-top: 1.5rem;">
        <div id="gridScreen">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <h1 id="gridTitle" style="color: #1e3a8a; font-size: 1.8rem; margin: 0; font-family: 'Baloo Thambi 2';">வகுப்பைத் தேர்ந்தெடுக்கவும்</h1>
                <p style="color: #64748b; margin-top: 0.5rem;">Choose your class to see lessons</p>
            </div>
            <div class="class-select-grid" id="classSelectGrid">
                <!-- Grid cards injected here -->
            </div>
        </div>

        <div id="lessonScreen" style="display: none;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 id="subjectTitle" style="color: #1e3a8a; font-size: 1.8rem; margin: 0; font-family: 'Baloo Thambi 2';">பாடம்</h1>
                <button onclick="showGrid()" style="background: none; border: none; color: #3b82f6; font-weight: 600; cursor: pointer; margin-top: 0.5rem;">❮ வகுப்பை மாற்றவும் (Change Class)</button>
            </div>

            <div class="class-tabs-container">
                <div class="class-tabs" id="classToggle">
                    <!-- Tabs injected here -->
                </div>
            </div>

            <div id="syllabusContainer">
                <!-- Lessons injected here -->
            </div>
        </div>

        <div style="height: 100px;"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </a>
        <a href="course.html" class="nav-item active">
            <span class="nav-icon">📚</span>
            <span>Course</span>
        </a>
        <a href="tel:6369371452" class="nav-item">
            <span class="nav-icon">📞</span>
            <span>Contact</span>
        </a>
        <a href="#" class="nav-item">
            <span class="nav-icon">💳</span>
            <span>Pay</span>
        </a>
        <a href="#" onclick="window.logout(); return false;" class="nav-item logout">
            <span class="nav-icon">🚪</span>
            <span>Logout</span>
        </a>
    </nav>

    <script type="module">
        (async () => {
            const v = "standard_v8";
            try {
                const { checkAuth, waitForAuth } = await import(`./js/auth.js?v=${v}`);
                await waitForAuth();
                const { syllabusData } = await import(`./js/data/syllabus.js?v=${v}`);
                const { extraSyllabusData } = await import(`./js/data/extraSyllabus.js?v=${v}`);

                const params = new URLSearchParams(window.location.search);
                const subject = params.get('id') || 'tamil';
                const paper = params.get('paper');
                const urlClass = params.get('class');

                const titles = {
                    'tamil': 'தமிழ் (Tamil)', 'english': 'English', 'maths': 'கணிதம் (Maths)',
                    'science': paper === '1' ? 'சூழ்நிலையியல் (EVS)' : 'அறிவியல் (Science)',
                    'social': paper === '1' ? 'சமூகவியல் (Social)' : 'சமூக அறிவியல் (Social)',
                    'psychology': 'உளவியல் (Psychology)',
                    'revision': 'திருப்புதல் தேர்வு (Revision)',
                    'mocktest': 'மாதிரித்தேர்வு (Mock Exam)',
                    'standard_6_7_8': '6, 7, 8 வகுப்புகள் (Exams)'
                };

                const gridScreen = document.getElementById('gridScreen');
                const lessonScreen = document.getElementById('lessonScreen');
                const classSelectGrid = document.getElementById('classSelectGrid');
                const syllabusContainer = document.getElementById('syllabusContainer');
                const classToggleEl = document.getElementById('classToggle');
                const classToggleWrap = document.querySelector('.class-tabs-container');
                const titleEl = document.getElementById('subjectTitle');

                let currentClass = null;
                let allowedClasses = ['1', '2', '3', '4', '5'];
                let useData = syllabusData;

                if (subject === 'psychology' || subject === 'revision' || subject === 'mocktest' || subject === 'standard_6_7_8') {
                    allowedClasses = ['all'];
                    useData = extraSyllabusData;
                } else if (paper !== '1') {
                    allowedClasses = ['6', '7', '8'];
                }

                const renderLessons = () => {
                    const data = useData[subject]?.[currentClass];
                    if (!data || data.length === 0) {
                        syllabusContainer.innerHTML = `<div style="text-align:center;padding:4rem;color:#64748b;"><b style="color:#1e3a8a;">வகுப்பு ${currentClass} பாடங்கள் இன்னும் பதிவேற்றப்படவில்லை.</b></div>`;
                        return;
                    }

                    let html = '';
                    data.forEach(term => {
                        const tTitle = (currentClass === 'all') ? term.term : (term.term === 'Annual' ? 'முழு ஆண்டு' : `பருவம் ${term.term}`);
                        html += `<div class="term-section"><h2 class="term-title">${tTitle}</h2><div class="topics-grid">`;
                        term.units.forEach(unit => {
                            unit.topics.forEach(topic => {
                                const isReady = topic.isUpdated;
                                html += `
                                <div class="topic-card ${isReady ? '' : 'faded'}" ${isReady ? 'onclick="toggleAccordion(this)"' : ''}>
                                    <div class="topic-title-wrapper">
                                        <h3 class="topic-title">${topic.title}${isReady ? '' : ' <small>(Soon)</small>'}</h3>
                                        <div class="chevron">${isReady ? '▼' : '🔒'}</div>
                                    </div>
                                    ${isReady ? `
                                    <div class="btn-group">
                                        <a href="material.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}${paper ? `&paper=${paper}` : ''}" class="card-btn btn-notes">📚 குறிப்புகள்</a>
                                        <a href="quiz.html?subject=${subject}&class=${currentClass}&lesson=${encodeURIComponent(topic.code || topic.title)}${paper ? `&paper=${paper}` : ''}" class="card-btn btn-quiz">📝 தேர்வு</a>
                                    </div>` : ''}
                                </div>`;
                            });
                        });
                        html += `</div></div>`;
                    });
                    syllabusContainer.innerHTML = html;
                };

                const selectClass = (c, isPop = false) => {
                    currentClass = c;
                    gridScreen.style.display = 'none';
                    lessonScreen.style.display = 'block';
                    titleEl.innerText = titles[subject] || subject;
                    
                    // Show tabs for easy switching
                    classToggleWrap.style.display = 'block';
                    classToggleEl.innerHTML = allowedClasses.map(cls => `
                        <button class="class-tab ${String(cls) === String(currentClass) ? 'active' : ''}" onclick="selectClass('${cls}')">${cls === 'all' ? 'All' : cls}</button>
                    `).join('');

                    renderLessons();
                    if (!isPop) {
                        const url = new URL(window.location);
                        url.searchParams.set('class', c);
                        window.history.pushState({ class: c }, '', url);
                    }
                };

                const showGrid = () => {
                    currentClass = null;
                    gridScreen.style.display = 'block';
                    lessonScreen.style.display = 'none';
                    const url = new URL(window.location);
                    url.searchParams.delete('class');
                    window.history.pushState({}, '', url);

                    classSelectGrid.innerHTML = allowedClasses.map(c => `
                        <button onclick="selectClass('${c}')" class="class-select-card card-color-${c}">
                            <span>வகுப்பு</span>
                            ${c === 'all' ? 'All' : c}
                        </button>
                    `).join('');
                };

                window.selectClass = selectClass;
                window.showGrid = showGrid;
                window.toggleAccordion = (card) => card.classList.toggle('expanded');

                if (urlClass && allowedClasses.includes(urlClass)) {
                    selectClass(urlClass, true);
                } else {
                    showGrid();
                }

                window.addEventListener('popstate', (e) => {
                    if (e.state && e.state.class) selectClass(e.state.class, true);
                    else showGrid();
                });

            } catch (err) {
                console.error(err);
            }
        })();
    </script>
</body>
</html>
