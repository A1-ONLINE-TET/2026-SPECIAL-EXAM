<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Coaching Center</title>
    <script src="js/auth.js" type="module"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <!-- MathJax loaded conditionally via JS -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;700;800&family=Outfit:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #1e3a8a; 
            --secondary: #10b981; 
            --bg: #f0f9ff;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Outfit', 'Noto Sans Tamil', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            transition: background-color 0.4s ease;
        }

        .header-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: background 0.5s ease;
        }

        .header-bar h1 { margin: 0; font-size: 1.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .header-bar p { margin: 0.5rem 0 0; opacity: 1; font-weight: 700; font-size: 1.2rem; }

        .container { max-width: 800px; margin: -2rem auto 4rem; padding: 0 1rem; position: relative; z-index: 10; }

        .material-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .watermark {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 40pt;
            font-weight: 900;
            color: rgba(0,0,0,0.06);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            z-index: -100;
        }
        .watermark-lower { top: 70%; }

        .section-header {
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: 800;
            border-bottom: 3px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin: 2.5rem 0 1rem;
            transition: color 0.4s ease;
        }

        .section-body { font-size: 1.1rem; line-height: 1.8; color: var(--text-main); text-align: justify; }
        .keyword { color: #db2777; font-weight: 800; }
        
        .info-box {
            background: #f0fdf4;
            border-left: 5px solid var(--secondary);
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
            transition: border-left-color 0.4s ease;
        }

        .qa-item {
            background: #f1f5f9;
            padding: 1.2rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #e2e8f0;
        }

        .qa-q { font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; transition: color 0.4s ease; }

        .sticky-back { position: fixed; bottom: 2rem; left: 1.5rem; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .back-btn {
            width: 50px; height: 50px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-decoration: none;
            color: var(--text-main); transition: 0.3s;
        }
        .back-btn:hover { transform: scale(1.1); color: var(--primary); }
        .print-btn { background: var(--primary); color: white; border: none; cursor: pointer; transition: background 0.4s ease; }
        .print-btn:hover { color: white; filter: brightness(1.2); }

        .loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #e2e8f0;
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .en-text { font-weight: bold; }
        .tm-text { font-weight: normal; }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .header-bar h1 { font-size: 1.4rem; }
            .material-card { padding: 1.5rem; border-radius: 1rem; }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 1rem; font-weight: 600; opacity: 0.7;">பாடம் லோடு ஆகிறது...</p>
    </div>

    <div class="watermark">A1 COACHING CENTER</div>
    <div class="watermark watermark-lower">A1 COACHING CENTER</div>

    <div class="header-bar">
        <h1>A1 ONLINE COACHING CENTER</h1>
        <p>📞 6369371452</p>
        <h1 id="lessonTitle" style="margin-top: 1rem; font-size: 1.4rem;">பாடம்</h1>
    </div>

    <div class="container">
        <div id="contentArea" class="material-card">
            <!-- Content will load here -->
        </div>
    </div>

    <div class="sticky-back">
        <a href="javascript:history.back()" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <button onclick="printMaterial()" class="back-btn print-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
    </div>

    <script type="module">
        (async () => {
            const v = Date.now();
            const { getLocalLessonData, formatText } = await import(`./js/fetchData.js?v=${v}`);

            const themes = {
                "science": { header: "SCIENCE | அறிவியல்", primary: "#1e3a8a", secondary: "#10b981", bg: "#f0f9ff", requiresMath: true },
                "maths": { header: "MATHEMATICS | கணிதம்", primary: "#0284c7", secondary: "#4f46e5", bg: "#f0f9ff", requiresMath: true },
                "social": { header: "SOCIAL SCIENCE | சமூக அறிவியல்", primary: "#e11d48", secondary: "#be123c", bg: "#fff1f2", requiresMath: false },
                "tamil": { header: "TAMIL | தமிழ்", primary: "#9f1239", secondary: "#fda4af", bg: "#fff1f2", requiresMath: false },
                "english": { header: "ENGLISH | ஆங்கிலம்", primary: "#6d28d9", secondary: "#8b5cf6", bg: "#f5f3ff", requiresMath: false },
                "psychology": { header: "PSYCHOLOGY | உளவியல்", primary: "#b45309", secondary: "#f59e0b", bg: "#fffbeb", requiresMath: false },
                "default": { header: "ONLINE COACHING", primary: "#1e3a8a", secondary: "#0c4a6e", bg: "#f0f9ff", requiresMath: false }
            };

            let currentTheme = themes["default"];

            function applyTheme(subjectRaw) {
                let subjectKey = (subjectRaw || "").toLowerCase().replace('math', 'maths');
                
                if (!themes[subjectKey]) {
                    if (subjectKey.includes('social')) subjectKey = 'social';
                    else if (subjectKey.includes('science')) subjectKey = 'science'; 
                    else if (subjectKey.includes('tamil')) subjectKey = 'tamil';
                    else if (subjectKey.includes('english')) subjectKey = 'english';
                    else if (subjectKey.includes('psy')) subjectKey = 'psychology';
                    else subjectKey = 'default';
                }

                currentTheme = themes[subjectKey];

                // Apply CSS Variables
                document.documentElement.style.setProperty('--primary', currentTheme.primary);
                document.documentElement.style.setProperty('--secondary', currentTheme.secondary);
                document.documentElement.style.setProperty('--bg', currentTheme.bg);
                
                // Set Header
                document.title = currentTheme.header + " - A1 Coaching Center";

                // Load MathJax if required
                if (currentTheme.requiresMath) {
                    const script = document.createElement('script');
                    script.id = "MathJax-script";
                    script.async = true;
                    script.src = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js";
                    window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
                    document.head.appendChild(script);
                }
            }

            window.printMaterial = function() {
                const title = document.getElementById('lessonTitle').innerText;
                const content = document.getElementById('contentArea').innerHTML;
                const pw = window.open('', '_blank');
                
                const mathJaxScript = currentTheme.requiresMath ? `
                    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"><\/script>
                    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"><\/script>
                    <script>
                        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\\\(', '\\\\)']] } };
                    <\/script>
                ` : '';

                pw.document.write(`<html><head><title>${title}</title>
                    ${mathJaxScript}
                    <style>
                    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 40px; line-height: 1.6; }
                    .p-header { text-align: center; border-bottom: 3px solid ${currentTheme.primary}; padding-bottom: 20px; margin-bottom: 30px; }
                    .p-header h1 { margin:0; color:${currentTheme.primary}; font-size: 24pt; }
                    .p-header p { margin:5px 0; font-weight:bold; font-size: 14pt; color:#444; }
                    .p-header h2 { margin-top:20px; font-size: 18pt; color:#333; }
                    .section-header { color: ${currentTheme.primary}; border-bottom: 2px solid #eee; margin-top: 30px; font-size: 16pt; }
                    .section-body { font-size: 14pt; line-height: 1.8; color: #111; text-align: justify; }
                    .info-box { background: #f0fdf4; border-left: 5px solid ${currentTheme.secondary}; padding: 15px; margin: 20px 0; border-radius: 8px; }
                    .qa-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 10px; border-radius: 8px; page-break-inside: avoid; }
                    .qa-q { font-weight: bold; color: ${currentTheme.primary}; margin-bottom: 5px; }
                    .keyword { color: #db2777; font-weight: 800; }
                    .en-text { font-weight: bold; }
                    .watermark { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%) rotate(-35deg); font-size: 35pt; font-weight: 900; color: rgba(0,0,0,0.06); white-space: nowrap; z-index: -100; }
                    .watermark-lower { top: 70%; }
                </style></head><body>
                    <div class="watermark">A1 COACHING CENTER</div>
                    <div class="watermark watermark-lower">A1 COACHING CENTER</div>
                    <div class="p-header">
                        <h1>A1 ONLINE COACHING CENTER</h1>
                        <p>📞 6369371452</p>
                        <h2>${title}</h2>
                    </div>
                    <div>${content}</div>
                    <script>
                        window.onload = () => { 
                            Promise.all([
                                document.fonts.ready,
                                window.MathJax ? window.MathJax.typesetPromise() : Promise.resolve()
                            ]).then(() => {
                                setTimeout(() => {
                                    window.print();
                                    const isMobile = /Android|iPhone/i.test(navigator.userAgent);
                                    if (!isMobile) { setTimeout(() => { window.close(); }, 1500); }
                                }, 500);
                            }).catch(() => {
                                window.print();
                            });
                        };
                    <\/script>
                </body></html>`);
                pw.document.close();
            };

            async function init() {
                const params = new URLSearchParams(window.location.search);
                const subject = params.get('subject') || 'default';
                const className = params.get('class');
                const lessonId = params.get('lesson');
                const paper = params.get('paper');

                const exitUrl = `subject.html?id=${subject}&class=${className}${paper ? `&paper=${paper}` : ''}`;
                const backBtn = document.querySelector('.sticky-back .back-btn');
                if (backBtn) backBtn.href = exitUrl;

                applyTheme(subject);

                if (!lessonId) {
                    document.getElementById('contentArea').innerHTML = "பாடம் குறிப்பிடப்படவில்லை.";
                    document.getElementById('loading').style.display = 'none';
                    return;
                }

                try {
                    const result = await getLocalLessonData(subject, className, lessonId);
                    
                    if (!result || !result.data) {
                        document.getElementById('contentArea').innerHTML = `
                            <div style="color:#64748b; text-align:center; padding:3rem 1rem; background:#f8fafc; border-radius:1rem; border:1px solid #e2e8f0; margin-top:2rem;">
                                <h3 style="margin-top:0;">பாடம் இன்னும் தயாராகவில்லை</h3>
                                <p style="font-weight:600;">தற்போது இந்த பாடத்திற்கான குறிப்புகள் பதிவேற்றம் செய்யப்படவில்லை.</p>
                                <p style="margin-bottom:0; opacity:0.8; font-size:0.9rem;">விரைவில் இணைக்கப்படும், அதுவரை பொறுத்திருக்கவும்.</p>
                            </div>
                        `;
                        return;
                    }

                    const data = result.data;
                    const meta = data.lesson_meta || data.meta || {};
                    const title = meta.title || data.title || lessonId;

                    if (data) {
                        const sections = data.sections || (data.material && data.material.sections);
                        const summary = data.summary || (data.material && data.material.summary);
                        
                        const fullHeader = `${currentTheme.header} - ${title}`;
                        document.getElementById('lessonTitle').innerText = fullHeader;
                        
                        let html = '';
                        if (summary) {
                            html += `<div class="info-box">${formatText(summary)}</div>`;
                        }

                        if (sections) {
                            html += sections.map(section => {
                                let contentHTML = '';
                                if (section.type === 'infobox') {
                                    const contentArray = Array.isArray(section.content) ? section.content : [section.content];
                                    contentHTML = `<div class="info-box">${contentArray.map(c => `<p>${formatText(c.text || c)}</p>`).join('')}</div>`;
                                } else if (section.type === 'evaluation') {
                                    const ed = section.evaluationData;
                                    contentHTML = `<div style="background:#f8fafc; border:1px solid #e2e8f0; padding:1.5rem; border-radius:1rem;">
                                        ${ed.mcqs ? ed.mcqs.map((m,i)=>`<div class="qa-item"><div class="qa-q">${i+1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                        ${ed.fillBlanks ? ed.fillBlanks.map((m,i)=>`<div class="qa-item"><div class="qa-q">${i+1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                        ${ed.trueFalse ? ed.trueFalse.map((m,i)=>`<div class="qa-item"><div class="qa-q">${i+1}. ${formatText(m.question)}</div><div style="font-weight:700; color:#1e293b;">விடை: ${formatText(m.answer)}</div></div>`).join('') : ''}
                                        ${ed.match ? ed.match.map(m => `<div style="display:flex; justify-content:space-between; margin-bottom:0.5rem; border-bottom:1px dashed #eee; padding-bottom:0.3rem;"><span>${m.key}</span><span> - ${m.value}</span></div>`).join('') : ''}
                                    </div>`;
                                } else if (section.type === 'pyq') {
                                    const contentArray = Array.isArray(section.content) ? section.content : [];
                                    contentHTML = `<div style="background:#f0fdf4; border:1px solid #dcfce7; padding:1.5rem; border-radius:1rem;">
                                        ${contentArray.map(item => `
                                            <div class="qa-item" style="background:#fff; border-color:#dcfce7;">
                                                <div class="qa-q" style="color:#065f46;">${formatText(item.question)}</div>
                                                <div style="font-weight:700; color:#1e293b;">விடை: ${formatText(item.answer)}</div>
                                            </div>
                                        `).join('')}
                                    </div>`;
                                } else {
                                    if (typeof section.content === 'string') {
                                        contentHTML = `<div class="section-body">${formatText(section.content)}</div>`;
                                    } else {
                                        contentHTML = (section.content || []).map(c => `
                                            <p class="section-body">${formatText(c.text || c)}</p>
                                        `).join('');
                                    }
                                }
                                return `<div><h2 class="section-header">${formatText(section.title)}</h2>${contentHTML}</div>`;
                            }).join('');
                        }

                        document.getElementById('contentArea').innerHTML = html;
                        
                        if (window.MathJax) {
                            window.MathJax.typesetPromise();
                        }
                    } else {
                        document.getElementById('contentArea').innerHTML = "பாடம் இன்னும் முழுமையாகத் தயாராகவில்லை.";
                    }
                } catch (error) {
                    document.getElementById('contentArea').innerHTML = `
                    <div style="color:#e11d48; text-align:center; padding:3rem 1rem; background:#fff1f2; border-radius:1rem; border:1px solid #fecaca; margin-top:2rem;">
                        <h3 style="margin-top:0;">பாடம் லோடு ஆகவில்லை!</h3>
                        <p style="font-weight:700; color:#991b1b;">${error.message}</p>
                        <p style="margin-bottom:0; opacity:0.7; font-size:0.9rem;">தயவுசெய்து அட்மினைத் தொடர்பு கொள்ளவும்.</p>
                    </div>`;
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }

            init();
        })();
    </script>
</body>
</html>
